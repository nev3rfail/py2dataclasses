name: Test

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  # Setting an environment variable with the value of a configuration variable
  GIST_STORAGE: ${{ vars.GIST_STORAGE }}
jobs:
  build:
    strategy:
      matrix:
        include:
          - python-version: "2.7"
            os: ubuntu-latest
            suffix: "2"
            container:
              image: coatldev/six:latest
            tox-env: "test_ported_on_portedlib_py27"
          - python-version: "3.14"
            os: ubuntu-latest
            container: python:3.14
            tox-env: "test_native_on_portedlib"
          - python-version: "3.14"
            os: ubuntu-latest
            container: python:3.14
            tox-env: "test_ported_on_portedlib"
          - python-version: "3.14"
            os: ubuntu-latest
            container: python:3.14
            tox-env: "test_ported_on_nativelib"
          - python-version: "3.14"
            os: ubuntu-latest
            container: python:3.14
            tox-env: "test_native_on_nativelib"
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Python
        if: matrix.python-version != '2.7'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        # coatldev/six:latest doesnt have gpg installed so we need to do this.
        #   TODO: maybe there is a way to extend container right here in the yml file?
        #if: matrix.suffix == '2'
        run: apt-get update --quiet && apt-get install --yes gnupg jq
      - name: Install tox and coverage
        run: python${{ matrix.suffix }} -m pip install tox coverage
      - name: Run tox
        run: python${{ matrix.suffix }} -m tox -e ${{ matrix.tox-env }}
        continue-on-error: true
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.tox-env }}.xml
          name: ${{ matrix.tox-env }}
          flags: ${{ matrix.tox-env }}
          slug: nev3rfail/py2dataclasses
      - name: Process test XML
        id: processed_json
        run: |
          echo "json<<EOF" >> $GITHUB_OUTPUT
          python${{ matrix.suffix }} -m tests._xmlprocessor < ${{ matrix.tox-env }}.xml >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

#      - name: Update gist
#        uses: gorgbus/gist-actions@main
#        env:
#          GITHUB_TOKEN: ${{ secrets.GIST_RW }}
#        with:
#          action: "update"
#          gist_id: ${{ env.GIST_STORAGE }}
#          file_name: py2dataclasses.tests.${{ matrix.tox-env }}.json
#          content: ${{ steps.processed_json.outputs.json }}
      - name: Build badge json
        id: badge
        uses: actions/github-script@v7
        with:
          script: |
            const data = JSON.parse(`${{ steps.processed_json.outputs.json }}`);

            const total = data.summary.tests;
            const passed = data.summary.passed;
            const errors = data.summary.errors;
            const failures = data.summary.failures;

            let color = "brightgreen";
            if (errors > 0) color = "red";
            else if (failures > 0) color = "yellow";

            const badge = {
              schemaVersion: 1,
              label: `${{ matrix.tox-env }}`,
              message: `[${passed}/${total}], E: ${errors}`,
              color: color
            };

            core.setOutput("json", JSON.stringify(badge, null, 2));
      - uses: Wandalen/wretry.action@master
        id: uploadit
        name: Upload badge
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_RW }}
        with:
          action: gorgbus/gist-actions@main
          attempt_limit: 10
          attempt_delay: 2000
          with: |
            action: "update"
            gist_id: ${{ env.GIST_STORAGE }}
            file_name: badge.${{ matrix.tox-env }}.json
            content: ${{ steps.badge.outputs.json }}