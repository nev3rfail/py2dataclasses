[tox]
envlist = py27, py314
skipsdist = true

[testenv:py27]
basepython = python2.7
deps =
    typing==3.10.0
    typing-extensions==3.10.0
    dictproxyhack==1.1
    funcsigs==1.0.2
    unittest2==1.1.0
commands =
    python -m unittest tests.test_dataclasses tests.test_load

[testenv:py314]
basepython = python3.14
commands =
    python -m unittest tests.test_dataclasses tests.test_load
    python -m unittest discover -s tests -p "test_compat_*.py"
