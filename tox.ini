[tox]
envlist =
    py27-backport
    py3-py314-with-backport
    py3-py27-with-builtin
    py3-py314-with-builtin

[testenv]
deps =
    pytest
    six
    unittest2
    funcsigs
    dictproxyhack
    typing
    tox

[testenv:py27-backport]
basepython = {env:PY27_PYTHON:venv-py27/Scripts/python.exe}
description = Run py2.7 tests with py2dataclasses backport on Python 2.7
deps =
    {[testenv]deps}
commands =
    pytest tests/test_py27_on_py27.py -v

[testenv:py3-py314-with-backport]
basepython = python3.14
description = Run py3.14 tests with py2dataclasses backport on Python 3
deps =
    {[testenv]deps}
commands =
    pytest tests/test_py314_on_py3.py -v

[testenv:py3-py27-with-builtin]
basepython = python3.14
description = Run py2.7 tests with Python 3 built-in dataclasses (compatibility check)
deps =
    {[testenv]deps}
commands =
    pytest tests/test_py27_on_py3.py -v

[testenv:py3-py314-with-builtin]
basepython = python3.14
description = Run py3.14 tests with Python 3 built-in dataclasses (baseline)
deps =
    {[testenv]deps}
commands =
    pytest tests/test_Dataclasses_py314/__init__.py -v
