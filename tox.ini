[tox]
envlist =
    py27-dataclasses
    py3-dataclasses314
    py3-py2tests
    py3-py3tests

[testenv]
deps =
    pytest
    six
    unittest2
    funcsigs
    dictproxyhack
    typing
    tox

[testenv:py27-dataclasses]
basepython = python2.7
commands =
    pytest tests/test_Dataclasses_py27/__init__.py

[testenv:py3-dataclasses314]
basepython = python3.14
commands =
    pytest tests/test_Dataclasses_py314/__init__.py

[testenv:py3-py2tests]
basepython = python3.14
commands =
    pytest tests/test_Python3_tests_on_py2.py

[testenv:py3-py3tests]
basepython = python3.14
commands =
    pytest tests/test_Python2_tests_on_py3.py
