[tox]
skipsdist = True
envlist = test_ported_on_portedlib_py27, test_load_py27, test_native_on_portedlib, test_load_py314, test_ported_on_portedlib, test_ported_on_nativelib, test_native_on_nativelib

[testenv]
setenv =
    PYTHONPATH = {toxinidir}/src
    LOAD_TEST_MODULES = tests.test_load_basic tests.test_load_collect tests.test_load_nested tests.test_load_typevars tests.test_dump tests.test_field_descriptor
install_command = {envpython} -E -m pip install {opts} {packages}

[testenv:test_ported_on_portedlib_py27]
basepython = python2.7
deps =
    typing==3.10.0
    typing-extensions==3.10.0
    dictproxyhack==1.1
    funcsigs==1.0.2
    unittest2==1.1.0
    six>=1.17
    unittest-xml-reporting>=1.17.0
    coverage==5.5
description = Run Python 2.7 tests on Python 2.7 with dataclasses backport
commands =
    python2 -m coverage run -m tests._xmlrunner tests.test_ported_on_portedlib --output-file=test_ported_on_portedlib_py27.xml
    python2 -m coverage xml -o test_ported_on_portedlib_py27-coverage.xml

[testenv:test_load_py27]
basepython = python2.7
deps =
    typing==3.10.0
    dictproxyhack==1.1
    unittest2==1.1.0
    six>=1.17
    unittest-xml-reporting>=1.17.0
    coverage==5.5
description = Run load/dump tests on Python 2.7 with dataclasses backport
commands =
    python2 -m coverage run -m tests._xmlrunner {env:LOAD_TEST_MODULES} --output-file=test_load_py27.xml
    python2 -m coverage xml -o test_load_py27-coverage.xml

[testenv:test_native_on_portedlib]
basepython = python3.14
deps =
    coverage>=7.13.4
    six>=1.17
    unittest-xml-reporting>=4.0.0
description = Run Python 3.14 tests on Python 3.14 with dataclasses backport
commands =
    python -m coverage run -m tests._xmlrunner tests.test_native_on_portedlib --output-file=test_native_on_portedlib.xml
    python -m coverage xml -o test_native_on_portedlib-coverage.xml

[testenv:test_load_py314]
basepython = python3.14
deps =
    coverage>=7.13.4
    six>=1.17
    unittest-xml-reporting>=4.0.0
description = Run load/dump tests on Python 3.14 with dataclasses backport
commands =
    python -m coverage run -m tests._xmlrunner {env:LOAD_TEST_MODULES} --output-file=test_load_py314.xml
